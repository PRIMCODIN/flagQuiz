<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<style>
  :root{
    --paper:#F4ECD8; --paper-raised:#FBF6EA; --ink:#1B3A4B;
    --line-soft:#DDD0B5; --radius-xl:8px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--paper);font-family:monospace;padding:24px;}
  .panel{display:inline-block;vertical-align:top;width:48%;margin:1%;}
  .panel h2{font-size:14px;margin-bottom:12px;color:var(--ink);}
  .question-card{background:var(--paper-raised);border-radius:var(--radius-xl);
    padding:3rem;border:1px solid #C9B79A;}

  /* ===== EXACTO de main.css ===== */
  .flag-container{
    position:relative;display:flex;align-items:center;justify-content:center;
    margin:0 auto 3rem;width:100%;max-width:320px;aspect-ratio:1/1;
    background:var(--paper);border-radius:50%;
  }
  .circular-timer{position:absolute;inset:0;width:100%;height:100%;}
  .timer-track{fill:none;stroke:var(--line-soft);stroke-width:8;}
  .timer-progress{fill:none;stroke:var(--ink);stroke-width:8;stroke-linecap:round;}
  .flag-image{width:78%;height:78%;object-fit:contain;position:relative;z-index:1;
    border-radius:4px;background:#c0392b;}

  /* ===== FIX candidato: pivota la rotacion en el centro ===== */
  .fixed .circular-timer{transform-box:fill-box;transform-origin:center;}
</style>
</head>
<body>
  <div class="panel current">
    <h2>ACTUAL (rotate inline, sin origin)</h2>
    <div class="question-card">
      <div class="flag-container">
        <svg class="circular-timer" viewBox="0 0 320 320" style="transform:rotate(-90deg)">
          <circle class="timer-track" cx="160" cy="160" r="155"></circle>
          <circle class="timer-progress" cx="160" cy="160" r="155"
                  stroke-dasharray="974" stroke-dashoffset="300"></circle>
        </svg>
        <div class="flag-image"></div>
      </div>
    </div>
  </div>

  <div class="panel fixed">
    <h2>CON FIX (transform-box:fill-box; transform-origin:center)</h2>
    <div class="question-card">
      <div class="flag-container">
        <svg class="circular-timer" viewBox="0 0 320 320" style="transform:rotate(-90deg)">
          <circle class="timer-track" cx="160" cy="160" r="155"></circle>
          <circle class="timer-progress" cx="160" cy="160" r="155"
                  stroke-dasharray="974" stroke-dashoffset="300"></circle>
        </svg>
        <div class="flag-image"></div>
      </div>
    </div>
  </div>
</body>
</html>
